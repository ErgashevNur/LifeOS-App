<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LifeOS</title>
    <meta
      name="description"
      content="LifeOS is a personal operating system designed to help you manage your life and tasks efficiently. It provides a centralized platform for organizing your schedule, tracking your goals, and staying productive."
    />
    <meta
      name="keywords"
      content="LifeOS, personal operating system, task
    management, productivity, schedule organization, goal tracking"
    />
    <meta name="author" content="LifeOS Team" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        window.__LIFEOS_APP_READY = false;

        function showBootError(message) {
          if (window.__LIFEOS_APP_READY) {
            return;
          }

          const root = document.getElementById("root");
          if (!root) {
            return;
          }

          root.innerHTML = `
            <section style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f8fafc;padding:16px;">
              <div style="width:100%;max-width:620px;border:1px solid #cbd5e1;border-radius:16px;background:#fff;padding:28px;text-align:center;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
                <p style="margin:0;color:#64748b;font-size:12px;letter-spacing:.16em;text-transform:uppercase;">LifeOS</p>
                <h1 style="margin:10px 0 0 0;color:#0f172a;font-size:30px;line-height:1.2;">Sahifa vaqtincha yuklanmadi</h1>
                <p style="margin:12px 0 0 0;color:#475569;font-size:14px;line-height:1.6;">
                  Xatolik yuz berdi. Sahifani qayta yuklab ko'ring.
                </p>
                <p style="margin:10px 0 0 0;color:#64748b;font-size:12px;line-height:1.5;">
                  ${String(message || "Kutilmagan xatolik")}
                </p>
                <button id="lifeos-reload-btn" style="margin-top:18px;height:40px;padding:0 16px;border-radius:10px;border:1px solid #0f172a;background:#0f172a;color:#fff;font-size:14px;cursor:pointer;">
                  Qayta yuklash
                </button>
              </div>
            </section>
          `;

          const reloadButton = document.getElementById("lifeos-reload-btn");
          if (reloadButton) {
            reloadButton.addEventListener("click", function () {
              window.location.reload();
            });
          }
        }

        function isModuleLoadError(message) {
          const normalized = String(message || "").toLowerCase();
          if (!normalized) {
            return false;
          }

          return (
            normalized.includes("failed to fetch dynamically imported module") ||
            normalized.includes("importing a module script failed") ||
            normalized.includes("failed to load module script")
          );
        }

        window.addEventListener("error", function (event) {
          if (window.__LIFEOS_APP_READY) {
            return;
          }

          if (!isModuleLoadError(event.message)) {
            return;
          }

          showBootError(event.message || "Sahifa yuklanmadi.");
        });

        window.addEventListener("unhandledrejection", function (event) {
          const reason = event.reason;
          const message =
            (reason && typeof reason.message === "string" && reason.message) ||
            (typeof reason === "string" && reason) ||
            "Sahifa yuklanmadi.";

          if (!window.__LIFEOS_APP_READY && isModuleLoadError(message)) {
            showBootError("Resurs yuklanmadi. Qayta urinib ko'ring.");
          }
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
